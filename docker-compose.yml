services:
  joy_publisher:
    build: .
    network_mode: host
    privileged: true  # for /dev/input access
    volumes:
      - /dev/input:/dev/input
    command: ros2 run rov_topside joy_publisher
    restart: unless-stopped

  dashboard:
    build: .
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - XAUTHORITY=/tmp/.docker_xauth
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${HOME}/.Xauthority:/tmp/.docker_xauth:ro
    command: ros2 run rov_topside dashboard
    restart: unless-stopped

  photogrammetry_saver:
    build: .
    network_mode: host
    volumes:
      - ~/rov_captures:/rov_captures
    command: ros2 run rov_topside photogrammetry_saver --ros-args -p save_dir:=/rov_captures
    restart: unless-stopped
