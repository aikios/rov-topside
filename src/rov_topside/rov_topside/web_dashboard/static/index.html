<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROV Control</title>
<style>
:root {
  --bg: #d4d4d8;
  --panel-bg: linear-gradient(180deg, #f8f8fa 0%, #e8e8ec 100%);
  --panel-border: #b8b8bc;
  --panel-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  --panel-inset: inset 0 1px 0 rgba(255,255,255,0.8);
  --text: #1d1d1f;
  --text-dim: #6e6e73;
  --accent: #4A90E2;
  --accent-border: #3672B6;
  --green: #2d9d3f;
  --red: #d63b30;
  --orange: #c27a00;
  --track-bg: #c8c8cc;
  --section-border: #c8c8cc;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Lucida Grande', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text);
  overflow: hidden; height: 100vh;
}
.panel {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border); border-radius: 10px;
  padding: 10px;
  box-shadow: var(--panel-shadow), var(--panel-inset);
}
.panel h3 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 6px;
}
.section-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-dim); margin: 8px 0 4px;
  padding-top: 6px; border-top: 1px solid var(--section-border);
}
#app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  gap: 6px; padding: 6px; height: 100vh;
}

/* Status bar — brushed metal feel */
#status-bar {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 18px;
  padding: 5px 14px; font-size: 11px; font-weight: 500;
  background: linear-gradient(180deg, #eee 0%, #d8d8dc 100%);
  border-bottom: 1px solid #aaa;
}
#heartbeat { font-size: 16px; transition: color 0.15s; }
.si { display:flex; gap:3px; align-items:center; }
.sl { color: var(--text-dim); font-size: 10px; }
.sv { font-variant-numeric: tabular-nums; font-size: 11px; font-weight: 600; }
.good { color: var(--green); }
.bad { color: var(--red); }

/* Bars — Aqua-style tracks */
.bar-row { display:flex; align-items:center; gap:4px; margin:2px 0; }
.bar-label { font-size:9px; color:var(--text-dim); width:42px; text-align:right; font-weight:500; }
.bar-track {
  flex:1; height:10px; background:var(--track-bg); border-radius:5px;
  position:relative; overflow:hidden;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.15), 0 1px 0 rgba(255,255,255,0.6);
}
.bar-fill {
  position:absolute; top:1px; bottom:1px; border-radius:4px;
  transition:width 0.06s, left 0.06s;
  box-shadow: inset 0 -1px 1px rgba(0,0,0,0.1), inset 0 1px 1px rgba(255,255,255,0.4);
}
.bar-fill.pos { background: linear-gradient(180deg, #6cbf3f 0%, #3a9d2f 100%); }
.bar-fill.neg { background: linear-gradient(180deg, #e85a4f 0%, #c43a30 100%); }
.bar-val { font-size:8px; width:30px; font-variant-numeric:tabular-nums; text-align:right; color:var(--text-dim); }

/* Motor items */
.motor-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
.motor-item { display:flex; align-items:center; gap:3px; font-size:9px; }
.motor-dot { width:6px; height:6px; border-radius:50%; background:#aaa; flex-shrink:0;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 1px 1px rgba(0,0,0,0.15); }
.motor-num { color:var(--text-dim); width:18px; font-size:9px; font-weight:600; }
.motor-track {
  flex:1; height:8px; background:var(--track-bg); border-radius:4px;
  position:relative; overflow:hidden;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.5);
}
.motor-fill {
  position:absolute; top:1px; bottom:1px; border-radius:3px;
  transition:width 0.06s, left 0.06s;
}

/* Depth hold */
.dh-row { display:flex; align-items:center; gap:8px; margin:2px 0; }
.dh-mode { font-size:11px; font-weight:700; }
.dh-detail { font-size:9px; color:var(--text-dim); font-variant-numeric:tabular-nums; }

/* Aqua pill buttons */
.btn {
  font-family: inherit; font-size:10px; font-weight:600; padding:3px 12px;
  border: 1px solid var(--accent-border); border-radius: 125px;
  background: var(--accent); color: #fff; cursor:pointer;
  box-shadow: inset 0 8px 12px rgba(255,255,255,0.35), 0 2px 4px rgba(0,0,0,0.15);
  position: relative; overflow: hidden;
  transition: all ease 0.2s;
}
.btn::before {
  content: ''; position:absolute; top:1px; left:4%; width:92%; height:45%;
  border-radius: 125px;
  background: linear-gradient(rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 100%);
  pointer-events: none;
}
.btn:hover {
  box-shadow: inset 0 8px 15px rgba(255,255,255,0.5), 0 3px 6px rgba(0,0,0,0.2);
  transform: scale(1.02);
}

/* Camera */
#camera-panel { position:relative; min-height:0; overflow:hidden; background: #222; border-radius:10px; }
#cam-img { width:100%; height:100%; object-fit:contain; display:block; transition:transform 0.3s; }
#cam-status { position:absolute; top:24px; right:12px; font-size:9px; font-weight:700;
  padding:2px 8px; border-radius:4px; background:rgba(0,0,0,0.5); color:#fff; }
#cam-rotate { position:absolute; top:24px; left:12px; font-size:13px;
  padding:3px 7px; border-radius:6px; background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.2); color:#fff; cursor:pointer; }
#cam-rotate:hover { background:rgba(255,255,255,0.3); }
#cam-capture { position:absolute; bottom:10px; right:12px; font-size:10px; font-weight:700;
  padding:3px 10px; border-radius:6px; background:rgba(0,0,0,0.5);
  color:#aaa; transition:all 0.15s; pointer-events:none; }
#cam-capture.flash { background:rgba(255,255,255,0.9); color:#000; }
#cam-flash-overlay { position:absolute; inset:0; background:white; opacity:0;
  transition:opacity 0.1s; pointer-events:none; }

#disconnected {
  position:fixed; inset:0; background:rgba(200,200,200,0.85);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--red); font-weight:600; z-index:100;
}
#disconnected.hidden { display:none; }
</style>
</head>
<body>
<div id="disconnected" class="hidden">Connecting to ROV...</div>
<div id="app">
  <div id="status-bar" class="panel">
    <span id="heartbeat">&#9829;</span>
    <div class="si"><span class="sl">FC</span><span id="s-fc" class="sv">--</span></div>
    <div class="si"><span class="sl">Armed</span><span id="s-arm" class="sv">--</span></div>
    <div class="si"><span class="sl">Mode</span><span id="s-mode" class="sv">--</span></div>
    <div class="si"><span class="sl">Depth</span><span id="s-depth" class="sv">--</span></div>
  </div>

  <div class="panel" id="controls-panel" style="overflow-y:auto;">
    <h3>Joystick</h3>
    <div id="joy-bars"></div>
    <div class="section-label">Motors <span id="servo-live" style="color:var(--green)"></span></div>
    <div class="motor-grid" id="motor-grid"></div>
    <div class="section-label">Depth Hold</div>
    <div class="dh-row">
      <span class="dh-mode" id="dh-mode">MANUAL</span>
      <button class="btn" id="btn-autotune" onclick="triggerAutotune()">Auto-Tune</button>
    </div>
    <div class="dh-detail" id="dh-detail"></div>
    <div class="dh-detail" id="dh-pid"></div>
  </div>

  <div id="camera-panel">
    <img id="cam-img" alt="">
    <div id="cam-flash-overlay"></div>
    <button id="cam-rotate" onclick="rotateCam()">&#8635;</button>
    <div id="cam-status">--</div>
    <div id="cam-capture">&#128247; 0</div>
  </div>
</div>

<script>
const JOY_NAMES = ['Lateral','Forward','L2','Yaw','Vertical','R2','DPad X','DPad Y'];
const N_MOTORS = 8;
function el(id) { return document.getElementById(id); }

function makeBars(id, labels) {
  const c = el(id);
  labels.forEach((l, i) => {
    c.insertAdjacentHTML('beforeend',
      `<div class="bar-row"><div class="bar-label">${l}</div>` +
      `<div class="bar-track"><div class="bar-fill" id="${id}-f${i}"></div></div>` +
      `<div class="bar-val" id="${id}-v${i}">0</div></div>`);
  });
}
function makeMotors() {
  const g = el('motor-grid');
  for (let i = 0; i < N_MOTORS; i++) {
    g.insertAdjacentHTML('beforeend',
      `<div class="motor-item"><div class="motor-dot" id="md${i}"></div>` +
      `<div class="motor-num">M${i+1}</div>` +
      `<div class="motor-track"><div class="motor-fill" id="mf${i}"></div></div>` +
      `<div class="motor-val" id="mv${i}">--</div></div>`);
  }
}
makeBars('joy-bars', JOY_NAMES);
makeMotors();

function setBar(id, i, v) {
  const f = el(`${id}-f${i}`), lbl = el(`${id}-v${i}`);
  if (!f) return;
  if (v >= 0) {
    f.style.left = '50%'; f.style.width = (v*50)+'%';
    f.className = 'bar-fill pos';
  } else {
    f.style.left = (50+v*50)+'%'; f.style.width = (-v*50)+'%';
    f.className = 'bar-fill neg';
  }
  lbl.textContent = v.toFixed(2);
}

function setMotor(i, pwm) {
  const dot=el(`md${i}`), fill=el(`mf${i}`), val=el(`mv${i}`);
  if (!dot) return;
  if (!pwm || pwm===0) { dot.style.background='#aaa'; val.textContent='--'; fill.style.width='0'; return; }
  const d = pwm-1500, n = d/400;
  const posGrad = 'linear-gradient(180deg, #6cbf3f 0%, #3a9d2f 100%)';
  const negGrad = 'linear-gradient(180deg, #e85a4f 0%, #c43a30 100%)';
  dot.style.background = d>5?'var(--green)':d<-5?'var(--red)':'#aaa';
  val.textContent = pwm;
  if (n>=0) {
    fill.style.left='50%'; fill.style.width=(n*50)+'%'; fill.style.background=posGrad;
  } else {
    fill.style.left=(50+n*50)+'%'; fill.style.width=(-n*50)+'%'; fill.style.background=negGrad;
  }
}

const camImg = el('cam-img');
let camUrl = null, camRotation = 0;
function rotateCam() {
  camRotation = (camRotation + 90) % 360;
  camImg.style.transform = 'rotate(' + camRotation + 'deg)';
}
function triggerAutotune() {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({cmd:'autotune'}));
}

let ws, hbBlink = false;
function connect() {
  const host = location.hostname || 'localhost';
  ws = new WebSocket(`ws://${host}:9090`);
  ws.binaryType = 'arraybuffer';
  el('disconnected').classList.remove('hidden');

  ws.onopen = () => el('disconnected').classList.add('hidden');
  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      if (camUrl) URL.revokeObjectURL(camUrl);
      camUrl = URL.createObjectURL(new Blob([e.data], {type:'image/jpeg'}));
      camImg.src = camUrl;
      el('cam-status').textContent = 'LIVE';
      el('cam-status').style.color = '#4f4';
      return;
    }
    const d = JSON.parse(e.data);

    const fc=el('s-fc'); fc.textContent=d.fc_connected?'Connected':'Disconnected';
    fc.className='sv '+(d.fc_connected?'good':'bad');
    const arm=el('s-arm'); arm.textContent=d.armed?'ARMED':'DISARMED';
    arm.className='sv '+(d.armed?'bad':'good');
    el('s-mode').textContent=d.mode||'--';
    if (d.depth!=null) el('s-depth').textContent=d.depth.toFixed(2)+'m';

    const hb=el('heartbeat');
    if (d.fc_heartbeat) { hbBlink=!hbBlink; hb.style.color=hbBlink?'var(--red)':'var(--green)'; }
    else hb.style.color='#bbb';

    if (d.joy_axes) d.joy_axes.forEach((v,i)=>setBar('joy-bars',i,v));

    if (d.servo_channels) {
      d.servo_channels.forEach((v,i)=>setMotor(i,v));
      el('servo-live').textContent=d.servo_channels.some(v=>v>0)?'LIVE':'';
    }

    if (d.capture_flash) {
      const overlay = el('cam-flash-overlay');
      overlay.style.opacity = '0.7';
      setTimeout(() => overlay.style.opacity = '0', 150);
      el('cam-capture').classList.add('flash');
      setTimeout(() => el('cam-capture').classList.remove('flash'), 500);
    }
    if (d.capture_count != null) el('cam-capture').textContent = '\u{1F4F7} ' + d.capture_count;

    const dhm=el('dh-mode');
    if (d.depth_hold) { dhm.textContent='DEPTH HOLD'; dhm.style.color='var(--green)'; }
    else { dhm.textContent='MANUAL'; dhm.style.color='var(--text-dim)'; }
    const sp = d.depth_setpoint;
    el('dh-detail').textContent = sp!=null ?
      `Depth: ${d.depth.toFixed(2)}m  |  Setpoint: ${sp.toFixed(2)}m` :
      `Depth: ${(d.depth||0).toFixed(2)}m`;
    el('dh-pid').textContent = d.pid_status||'';
  };
  ws.onclose = () => { el('disconnected').classList.remove('hidden'); setTimeout(connect,2000); };
  ws.onerror = () => ws.close();
}
connect();
</script>
</body>
</html>
